spring.application.name=bus2holiday
server.port=${PORT:8081}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:${POSTGRES_HOST:${DB_HOST:localhost}}}:${PGPORT:${POSTGRES_PORT:${DB_PORT:5432}}}/${PGDATABASE:${POSTGRES_DB:${DB_NAME:bus2holiday}}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:${POSTGRES_USER:${DB_USER:thera}}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:${POSTGRES_PASSWORD:${DB_PASSWORD:1702}}}}

spring.flyway.enabled=false

# Hibernate auto-creates PostgreSQL enum types via @JdbcTypeCode(NAMED_ENUM)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# data.sql runs AFTER Hibernate DDL (seeds data)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
